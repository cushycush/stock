name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          EXTENSION=""
          if [ "$GOOS" = "windows" ]; then
            EXTENSION=".exe"
          fi
          NAME="stock-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}${EXTENSION}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "${NAME}" ./cmd/stock

      - name: Create ZIP archive
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          EXTENSION=""
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXTENSION=".exe"
          fi
          BASE="stock-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          zip "${BASE}.zip" "${BASE}${EXTENSION}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: |
            stock-*.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  aur:
    name: Update AUR packages
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}

    steps:
      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          TAG="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up SSH
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure git
        run: |
          git config --global user.name "Matthew Cushing"
          git config --global user.email "cushing.matt@gmail.com"

      - name: Update stock
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ steps.version.outputs.TAG }}
        run: |
          git clone ssh://aur@aur.archlinux.org/stock.git /tmp/stock-aur
          cd /tmp/stock-aur

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          cat > .SRCINFO <<SRCEOF
          pkgbase = stock
          	pkgdesc = Package/tool/runtime installer — companion to store
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/cushycush/stock
          	arch = x86_64
          	arch = aarch64
          	license = MIT
          	makedepends = go
          	depends = glibc
          	conflicts = stock-bin
          	conflicts = stock-git
          	provides = stock
          	source = stock-${VERSION}.tar.gz::https://github.com/cushycush/stock/archive/v${VERSION}.tar.gz
          	sha256sums = SKIP

          pkgname = stock
          SRCEOF
          # .SRCINFO requires leading tabs, not spaces
          sed -i 's/^          //' .SRCINFO

          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || { git commit -m "Update to ${TAG}"; git push; }

      - name: Update stock-bin
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ steps.version.outputs.TAG }}
        run: |
          REPO_URL="https://github.com/cushycush/stock"

          README_SHA=$(curl -sL "${REPO_URL}/raw/${TAG}/README.md" | sha256sum | cut -d' ' -f1)
          LICENSE_SHA=$(curl -sL "${REPO_URL}/raw/${TAG}/LICENSE" | sha256sum | cut -d' ' -f1)
          AMD64_SHA=$(curl -sL "${REPO_URL}/releases/download/${TAG}/stock-${TAG}-linux-amd64.zip" | sha256sum | cut -d' ' -f1)
          ARM64_SHA=$(curl -sL "${REPO_URL}/releases/download/${TAG}/stock-${TAG}-linux-arm64.zip" | sha256sum | cut -d' ' -f1)

          git clone ssh://aur@aur.archlinux.org/stock-bin.git /tmp/stock-bin
          cd /tmp/stock-bin

          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          sed -i "s/^sha256sums=.*/sha256sums=('${README_SHA}'/" PKGBUILD
          sed -i "/^sha256sums=/{ n; s/.*/            '${LICENSE_SHA}')/ }" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${AMD64_SHA}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${ARM64_SHA}')/" PKGBUILD

          cat > .SRCINFO <<SRCEOF
          pkgbase = stock-bin
          	pkgdesc = Package/tool/runtime installer — companion to store
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/cushycush/stock
          	arch = x86_64
          	arch = aarch64
          	license = MIT
          	depends = glibc
          	conflicts = stock
          	conflicts = stock-git
          	provides = stock
          	source = README-${VERSION}.md::https://raw.githubusercontent.com/cushycush/stock/v${VERSION}/README.md
          	source = LICENSE-${VERSION}::https://raw.githubusercontent.com/cushycush/stock/v${VERSION}/LICENSE
          	sha256sums = ${README_SHA}
          	sha256sums = ${LICENSE_SHA}
          	source_x86_64 = stock-x86_64-${VERSION}.zip::https://github.com/cushycush/stock/releases/download/v${VERSION}/stock-v${VERSION}-linux-amd64.zip
          	sha256sums_x86_64 = ${AMD64_SHA}
          	source_aarch64 = stock-aarch64-${VERSION}.zip::https://github.com/cushycush/stock/releases/download/v${VERSION}/stock-v${VERSION}-linux-arm64.zip
          	sha256sums_aarch64 = ${ARM64_SHA}

          pkgname = stock-bin
          SRCEOF
          sed -i 's/^          //' .SRCINFO

          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || { git commit -m "Update to ${TAG}"; git push; }
